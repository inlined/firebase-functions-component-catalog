apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: functions_v1_callable
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Firebase Functions v1 Task Queue Function
    source:
      repo: https://github.com/inlined/firebase-component-catalog.git
      sourceType: git
      dir: /modules/functions_v1_taskqueue
    version: 0.0.2
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description: {}
    icon: icons/firebase.png
  content:
    examples:
      - name: functions_v1_taskqueue_basic
        location: examples/functions_v1_taskqueue
  connections:
    - name: firebase_admin_config
      source:
        source: github.com/inlined/firebase-component-catalog//modules/firebase-config
        version: 0.0.1
      spec:
        outputExpr: config
  interfaces:
    variables:
      - name: name
        description: The name of the function. If extension_id is set, the actual function name will be 'ext-extension_id-name'.
        varType: string
        required: true
      - name: source_archive
        description: The `gs://` URL of the source code ZIP archive.
        varType: string
        required: true
      - name: extension_id
        description: The extension ID, if this function is part of an extension.
        varType: string
      - name: project_id
        description: The project ID.
        varType: string
        required: true
      - name: region
        description: The region to deploy the function to.
        varType: string
      - name: invokers
        description: The invokers for the function.
        varType: list(string)
      - name: firebase_admin_config
        description: The standard Firebase Admin configuration.
        varType: |
          object({
            projectId: string
            databaseURL: string
            storageBucket: string
            location: string
          })
      - name: runtime
        description: The runtime in which the function will run.
        varType: string
      - name: description
        description: The description of the function.
        varType: string
      - name: available_memory_mb
        description: The amount of memory in MB available for the function.
        varType: number
      - name: timeout
        description: The amount of time in seconds the function has to execute.
        varType: number
      - name: environment_variables
        description: A map of environment variables.
        varType: map(string)
      - name: labels
        description: A map of labels.
        varType: map(string)
      - name: max_instances
        description: The maximum number of instances for the function.
        varType: number
      - name: min_instances
        description: The minimum number of instances for the function.
        varType: number
      - name: service_account
        description: The service account for the function. Can use a full email address or a name ending with @ for project-relative service accounts.
        varType: string
      - name: secret_environment_variables
        description: A list of secret environment variables.
        varType: |
          list(object({
            key: string
            secret: string
            version: string
          }))
      - name: vpc_connector
        description: The VPC Access Connector.
        varType: string
      - name: vpc_connector_egress_settings
        description: The VPC Access Connector egress settings.
        varType: string
      - name: ingress_settings
        description: The ingress settings for the function.
        varType: string
      - name: rate_limits_max_concurrent_dispatches
        description: The maximum number of concurrent tasks that Cloud Tasks allows to be dispatched for this queue.
        varType: number
      - name: rate_limits_max_dispatches_per_second
        description: The maximum rate at which tasks are dispatched from this queue.
        varType: number
      - name: retry_config_max_attempts
        description: Number of attempts per task.
        varType: number
      - name: retry_config_max_retry_duration
        description: If positive, max_retry_duration specifies the time limit for retrying a failed task.
        varType: string
      - name: retry_config_min_backoff
        description: A task will be scheduled for retry between min_backoff and max_backoff duration after it fails.
        varType: string
      - name: retry_config_max_backoff
        description: A task will be scheduled for retry between min_backoff and max_backoff duration after it fails.
        varType: string
      - name: retry_config_max_doublings
        description: The time between retries will double max_doublings times.
        varType: number
    outputs:
      - name: name
        description: The computed name of the function.
      - name: id
        description: The ID of the function.
      - name: url
        description: The URL of the HTTPS trigger.
      - name: queue_name
        description: The name of the Task Queue.
      - name: queue_id
        description: The ID of the Task Queue.
  requirements:
    roles:
      - level: Project
        roles:
          - roles/cloudtasks.admin
          - roles/cloudtasks.enqueuer
          - roles/firebase.admin
          - roles/iam.serviceAccountAdmin
          - roles/iam.serviceAccountUser
          - roles/serviceusage.serviceUsageAdmin
    services:
      - cloudfunctions.googleapis.com
      - cloudtasks.googleapis.com
      - iam.googleapis.com
      - serviceusage.googleapis.com
    providerVersions:
      - source: hashicorp/google
        version: ">= 5.0, < 8.0"
      - source: hashicorp/google-beta
        version: ">= 5.0, < 8.0"
