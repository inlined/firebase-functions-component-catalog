apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: mock-firebase-config-source_display
spec:
  info:
    title: Mock Firebase Config Source Display
    source:
      repo: https://github.com/inlined/firebase-component-catalog.git
      sourceType: git
      dir: /terraform/modules/mock-firebase-config-source
  ui:
    input:
      variables:
        projectId:
          name: projectId
          title: Project ID
          level: 1
        databaseURL:
          name: databaseURL
          title: Database URL
          level: 1
        storageBucket:
          name: storageBucket
          title: Storage Bucket
          level: 1
        location:
          name: location
          title: Location
          level: 1
    runtime:
      outputs:
        config:
          visibility: VISIBILITY_ROOT
