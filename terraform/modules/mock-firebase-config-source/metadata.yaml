apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: mock-firebase-config-source
spec:
  info:
    title: Mock Firebase Config Source
    source:
      repo: https://github.com/inlined/firebase-component-catalog.git
      sourceType: git
      dir: /terraform/modules/mock-firebase-config-source
    version: 0.0.1
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description: {}
    icon: icons/firebase.png
  interfaces:
    variables:
      - name: projectId
        description: The project ID.
        varType: string
        required: true
      - name: databaseURL
        description: The database URL.
        varType: string
        required: true
      - name: storageBucket
        description: The storage bucket.
        varType: string
        required: true
      - name: location
        description: The location.
        varType: string
        required: true
    outputs:
      - name: config
        description: The Firebase admin config object.
